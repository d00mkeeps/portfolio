name: Deploy Portfolio

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy via Cloudflare Tunnel
        env:
          SSH_HOSTNAME: ${{ secrets.VOLCANO_SSH_HOSTNAME }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOSTNAME" ] || [ -z "$SERVER_USER" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Error: One or more deployment secrets are missing!"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "Host $SSH_HOSTNAME
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            ConnectTimeout 30
            IdentityFile ~/.ssh/id_deploy" > ~/.ssh/config
          ssh "$SERVER_USER@$SSH_HOSTNAME" \
              "cd /home/miles/portfolio && git pull origin main && docker compose up -d --build"
